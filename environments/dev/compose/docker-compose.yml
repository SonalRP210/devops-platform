services:
  # Realm JSON is bind-mounted; --import-realm runs when Keycloak creates a fresh dev store.
  # If you changed infra/keycloak/sportsbetting-realm.json (e.g. BET_READ / BET_PLACE for feeder) but tokens
  # still lack new roles, remove the Keycloak container (and any attached volume) so import runs again:
  #   docker compose rm -sf keycloak && docker compose up -d keycloak
  # Or update roles in the Admin UI. See README "Local Keycloak and realm import".
  #
  # keycloak-dev-user-fix: one-shot Admin API patch so password grant works (no "Account is not fully set up").
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: sb-keycloak
    restart: unless-stopped
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    ports:
      - "8090:8080"
      - "9001:9000"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../keycloak/sportsbetting-realm.json:/opt/keycloak/data/import/sportsbetting-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf \"HEAD /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'",
        ]
      interval: 5s
      timeout: 5s
      retries: 48
      start_period: 180s

  keycloak-dev-user-fix:
    image: alpine:3.20
    container_name: sb-keycloak-dev-user-fix
    restart: "no"
    environment:
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ../keycloak/scripts/fix-keycloak-dev-users.sh:/fix.sh:ro
    # Strip CR so Windows CRLF bind mounts do not break ash (exit 2 on stray \r).
    entrypoint:
      - /bin/sh
      - -c
      - "tr -d '\\r' < /fix.sh > /tmp/fix.lf && exec /bin/sh /tmp/fix.lf"
    depends_on:
      keycloak:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: sb-postgres
    restart: unless-stopped
    # wal_level=logical is required for Debezium CDC (logical replication slots)
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sportsbetting
      POSTGRES_USER: sportsbetting
      POSTGRES_PASSWORD: sportsbetting
    volumes:
      - ../../data/postgres/scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql:ro
      - ../../data/postgres/scripts/grants.sql:/docker-entrypoint-initdb.d/02-grants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsbetting -d sportsbetting"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.6
    container_name: sb-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list --brokers localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.5
    container_name: sb-schema-registry
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "18081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: redpanda:9092

  kafka-init:
    image: redpandadata/redpanda:v24.1.6
    container_name: sb-kafka-init
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]

  debezium-connect:
    # Full semver tag required (e.g. 2.7 is not published). Quay is Debezium's primary registry.
    image: quay.io/debezium/connect:2.7.4.Final
    container_name: sb-debezium-connect
    restart: unless-stopped
    ports:
      - "8093:8083"   # host 8093 — 8083 is taken by wallet-service
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium.connect.configs
      OFFSET_STORAGE_TOPIC: debezium.connect.offsets
      STATUS_STORAGE_TOPIC: debezium.connect.status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  debezium-init:
    image: curlimages/curl:latest
    container_name: sb-debezium-init
    restart: on-failure
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./debezium/register-connector.sh:/register.sh:ro
      - ./debezium/odds-outbox-connector.json:/odds-outbox-connector.json:ro
      - ./debezium/betting-outbox-connector.json:/betting-outbox-connector.json:ro
    entrypoint: ["/bin/sh", "/register.sh"]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sb-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api-gateway:
        condition: service_started
      user-service:
        condition: service_started
      wallet-service:
        condition: service_started
      betting-service:
        condition: service_started
      odds-service:
        condition: service_started
      event-ingestion-service:
        condition: service_started
      settlement-service:
        condition: service_started
      notification-service:
        condition: service_started
      risk-service:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.5
    container_name: sb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  api-gateway:
    build: { context: ../.., dockerfile: services/api-gateway/Dockerfile }
    container_name: sb-api-gateway
    restart: unless-stopped
    ports: ["8070:8080"]
    environment: &common_env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sportsbetting
      SPRING_DATASOURCE_USERNAME: sportsbetting
      SPRING_DATASOURCE_PASSWORD: sportsbetting
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      APP_KAFKA_CONSUMER_MAX_ATTEMPTS: 3
      APP_KAFKA_CONSUMER_BACKOFF_MS: 1000
      APP_KAFKA_DLT_SUFFIX: .dlq
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      APP_KAFKA_SCHEMA_VALIDATION_ENABLED: "false"
      GATEWAY_OIDC_TOKEN_ENDPOINT: http://keycloak:8080/realms/sportsbetting/protocol/openid-connect/token
      GATEWAY_OIDC_CLIENT_ID: odds-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      user-service:
        condition: service_started
      betting-service:
        condition: service_started
      wallet-service:
        condition: service_started
      odds-service:
        condition: service_started
      event-ingestion-service:
        condition: service_started
      settlement-service:
        condition: service_started
      notification-service:
        condition: service_started
      risk-service:
        condition: service_started
      keycloak:
        condition: service_healthy
      keycloak-dev-user-fix:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  user-service:
    build: { context: ../.., dockerfile: services/user-service/Dockerfile }
    container_name: sb-user-service
    restart: unless-stopped
    ports: ["8082:8080"]
    environment: *common_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/users/user-1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  wallet-service:
    build: { context: ../.., dockerfile: services/wallet-service/Dockerfile }
    container_name: sb-wallet-service
    restart: unless-stopped
    ports: ["8083:8080"]
    environment: *common_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/wallet/user-1/balance >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  betting-service:
    build: { context: ../.., dockerfile: services/betting-service/Dockerfile }
    container_name: sb-betting-service
    restart: unless-stopped
    ports: ["8094:8084"]
    environment:
      <<: *common_env
      APP_KAFKA_SCHEMA_VALIDATION_ENABLED: "true"
      JWT_ISSUER_URI: http://keycloak:8080/realms/sportsbetting
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-dev-user-fix:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8084/actuator/health/readiness >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  odds-service:
    build: { context: ../.., dockerfile: services/odds-service/Dockerfile }
    container_name: sb-odds-service
    restart: unless-stopped
    ports: ["8085:8080"]
    environment:
      <<: *common_env
      APP_KAFKA_SCHEMA_VALIDATION_ENABLED: "true"
      JWT_ISSUER_URI: http://keycloak:8080/realms/sportsbetting
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-dev-user-fix:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health/readiness >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  event-ingestion-service:
    build: { context: ../.., dockerfile: services/event-ingestion-service/Dockerfile }
    container_name: sb-event-ingestion-service
    restart: unless-stopped
    ports: ["8086:8080"]
    environment: *common_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/internal/normalized-events >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  settlement-service:
    build: { context: ../.., dockerfile: services/settlement-service/Dockerfile }
    container_name: sb-settlement-service
    restart: unless-stopped
    ports: ["8087:8080"]
    environment: *common_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/internal/outbox >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  notification-service:
    build: { context: ../.., dockerfile: services/notification-service/Dockerfile }
    container_name: sb-notification-service
    restart: unless-stopped
    ports: ["8088:8080"]
    environment: *common_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/internal/deliveries >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  risk-service:
    build: { context: ../.., dockerfile: services/risk-service/Dockerfile }
    container_name: sb-risk-service
    restart: unless-stopped
    ports: ["8089:8080"]
    environment: *common_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/v1/risk/total >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

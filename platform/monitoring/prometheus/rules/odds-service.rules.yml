# Prometheus alerting rules for odds-service (Pod scrape: kube-prometheus PodMonitor / ServiceMonitor).
# Targets carry Kubernetes labels such as namespace, pod, container. Matchers align with
# services/odds-service/k8s/deployment.yaml (container name `odds-service`).
#
# If multiple namespaces deploy similarly named pods, add a fixed namespace matcher on every expr line:
#   namespace="your-namespace",
#
# Micrometer: counter `outbox.dispatch.failures` -> `outbox_dispatch_failures_total`.

groups:
  - name: odds-service.app
    interval: 30s
    rules:
      - alert: OddsServiceHttp5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{
              pod=~"odds-service-.+",
              container="odds-service",
              uri!~"/actuator/.*",
              status=~"5.."
            }[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{
              pod=~"odds-service-.+",
              container="odds-service",
              uri!~"/actuator/.*"
            }[5m])), 1e-6)
          ) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Elevated HTTP 5xx rate on odds-service
          description: >-
            More than 2% of non-actuator HTTP requests returned 5xx over 5m (scoped by pod/container).

      - alert: OddsServiceOutboxDispatchFailures
        expr: |
          rate(outbox_dispatch_failures_total{
            pod=~"odds-service-.+",
            container="odds-service"
          }[5m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Outbox polling dispatch is failing (odds-service)
          description: >-
            OutboxPoller path only; increments when dispatch throws. If you rely on Debezium CDC,
            still alert on connector lag; this guards the polling fallback.

  # Requires kube-state-metrics and compatible kube_* metric labels (deployment / namespace).
  - name: odds-service.kube
    interval: 30s
    rules:
      - alert: OddsServiceDeploymentReplicasUnavailable
        expr: |
          (
            kube_deployment_spec_replicas{deployment="odds-service"}
              >
            kube_deployment_status_replicas_available{deployment="odds-service"}
          )
          and kube_deployment_spec_replicas{deployment="odds-service"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: odds-service Deployment has unavailable replicas
          description: >-
            Spec replicas exceed available replicas for deployment odds-service.
            Add `namespace="..."` to selectors if deployment names collide across namespaces.

  - name: odds-service.dependencies
    interval: 30s
    rules:

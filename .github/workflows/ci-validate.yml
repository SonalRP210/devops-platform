name: DevOps Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-structure-and-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required folders
        run: |
          test -d platform
          test -d environments
          test -d loadtests
          test -d scripts

      - name: Install YAML validation dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate YAML files
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import yaml

          files = [
            p for p in pathlib.Path(".").rglob("*.yml")
          ] + [
            p for p in pathlib.Path(".").rglob("*.yaml")
          ]

          failures = []
          for path in files:
            try:
              yaml.safe_load(path.read_text(encoding="utf-8"))
            except Exception as exc:
              failures.append(f"{path}: {exc}")

          if failures:
            print("YAML validation failed:")
            for failure in failures:
              print(f" - {failure}")
            sys.exit(1)

          print(f"Validated {len(files)} YAML files.")
          PY

      - name: Validate shell scripts syntax
        run: |
          shopt -s globstar nullglob
          files=(**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          for file in "${files[@]}"; do
            bash -n "$file"
          done

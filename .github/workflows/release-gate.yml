name: Release Gate

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to promote to"
        required: true
        type: choice
        options:
          - dev
          - stage
          - perf
          - prod
      image_tag:
        description: "Application image tag to deploy"
        required: true
        type: string

jobs:
  preflight-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate environment exists
        run: |
          test -d "environments/${{ inputs.target_environment }}"

      - name: Validate image tag format
        run: |
          if [ -z "${{ inputs.image_tag }}" ]; then
            echo "image_tag is required"
            exit 1
          fi
          if [[ "${{ inputs.image_tag }}" =~ [[:space:]] ]]; then
            echo "image_tag cannot contain whitespace"
            exit 1
          fi

      - name: Validate docker compose files
        run: |
          shopt -s nullglob
          files=(environments/dev/compose/*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No compose files found to validate."
            exit 0
          fi
          for file in "${files[@]}"; do
            docker compose -f "$file" config >/dev/null
          done

  deploy:
    needs:
      - preflight-validation
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment placeholder
        run: |
          echo "Promoting image tag ${{ inputs.image_tag }} to ${{ inputs.target_environment }}."
          echo "Replace this step with ArgoCD/Flux/Helm deployment command pinned to the image tag."
